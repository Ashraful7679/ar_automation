<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Required - AR Automation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 100%; max-width: 500px; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; text-align: center; }
        .icon { font-size: 4rem; color: #dc3545; margin-bottom: 1rem; }
        .btn-primary { background-color: #0d6efd; border: none; padding: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⚠️</div>
        <h3>{{ reason }}</h3>
        <p class="text-muted mt-3">
            Your current subscription has ended or your processing quota has been reached. 
            To continue using the AR Automation tool, please contact your administrator for a subscription extension.
        </p>
        <div class="mt-4">
            <a href="/logout" class="btn btn-outline-secondary">Logout</a>
            <a href="mailto:support@example.com" class="btn btn-primary ms-2">Contact Admin</a>
        </div>
        <div class="text-center mt-4">
            <small class="text-muted">User ID: {{ current_user.username }}</small>
        </div>
    </div>
</body>
</html>
