<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login - AR Automation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212529; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 15px; background-color: #343a40; border: 1px solid #495057; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-danger { background-color: #dc3545; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="text-center mb-4">
            <h2 class="text-danger">SUPER ADMIN</h2>
            <p class="text-muted">Master Control Portal</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
            </div>
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <button type="submit" class="btn btn-danger w-100">Access Portal</button>
        </form>
    </div>
</body>
</html>
